ServerName                      "ProFTPD Integration Test Server"
ServerType                      standalone
DefaultServer                   on
Port                            21
MaxInstances                    10

# /dev/stdout is a symlink in Docker; proftpd rejects symlinks as log targets.
# Silence logs – we don't need them for tests.
SystemLog                       /dev/null
TransferLog                     /dev/null

# Load TLS module (provided by proftpd-mod-crypto)
ModulePath                      /usr/lib/proftpd
LoadModule                      mod_tls.c

# Authentication: allow users with non-login shells
RequireValidShell               off

# Chroot each user to their home directory
DefaultRoot                     ~

# Passive mode: fixed port range, masquerade as loopback so the test
# client (connecting from the host) reaches the mapped host ports
PassivePorts                    30000 30009
MasqueradeAddress               127.0.0.1

Umask                           022
AllowOverwrite                  on
AllowStoreRestart               on

<Directory ~>
  AllowOverwrite                on
  <Limit ALL>
    AllowAll
  </Limit>
</Directory>

<IfModule mod_tls.c>
  TLSEngine                     on
  TLSProtocol                   TLSv1.2 TLSv1.3
  TLSRSACertificateFile         /etc/proftpd/ssl/server.crt
  TLSRSACertificateKeyFile      /etc/proftpd/ssl/server.key
  TLSVerifyClient               off
  # Allow both plain and TLS connections on the same port (explicit FTPS)
  TLSRequired                   off
  TLSOptions                    NoSessionReuseRequired
</IfModule>
